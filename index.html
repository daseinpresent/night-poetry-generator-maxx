        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; 
            margin: 0;
            padding: 0;
            overscroll-behavior: none; 
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
        }
        
        canvas { display: none; }
        
        .img-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #previewImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: opacity 0.3s ease;
        }

        .overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        input[type=range] { accent-color: #3b82f6; }
    </style>

            { name: "【廣州】珠江水溫柔", w: ['晚', '風', '吻過', '了', '珠江水'], e: ['Canton', 'Tower'], q: ['“ 喝一盅廣式的早茶，', '看一江珠水映照繁華 ”'] },
            { name: "【西安】長安城亮花燈", w: ['長', '安', '亮起', '了', '花燈'], e: ['Ancient', 'Chang an'], q: ['“ 晚風吹過明城牆，', '一不小心就回到了大唐 ”'] },
            { name: "【南京】秦淮河伴夜月", w: ['秦', '淮', '伴著', '這', '夜月'], e: ['Nanjing', 'memories'], q: ['“ 烏衣巷口的夕陽斜，', '金陵城的夜色惹人醉 ”'] },
            { name: "【武漢】長江橋晚霞", w: ['晚', '霞', '染紅', '了', '長江橋'], e: ['River', 'city'], q: ['“ 長江大橋上的晚風，', '吹散了江城的幾多愁 ”'] },
            { name: "【廈門】鼓浪嶼聽海浪", w: ['海', '浪', '拍打', '著', '鼓浪嶼'], e: ['Xiamen', 'island'], q: ['“ 走在環島路的晚風裡，', '聽海浪訴說著鷺島的故事 ”'] },
            { name: "【長沙】橘子洲看煙火", w: ['煙', '火', '照亮', '了', '橘子洲'], e: ['Changsha', 'night'], q: ['“ 走進解放西的夜色裡，', '感受星城的不眠與熱烈 ”'] },
            { name: "【蘇州】平江路聽評彈", w: ['小', '橋', '遇見', '了', '流水'], e: ['Suzhou', 'Jiangnan'], q: ['“ 聽一曲平江路的評彈，', '做一場姑蘇城外的水鄉夢 ”'] },
            { name: "【青島】棧橋邊吹海風", w: ['海', '風', '吹過', '了', '棧橋'], e: ['Qingdao', 'seaside'], q: ['“ 喝一袋青島的散裝啤酒，', '把煩惱都丟進這片海裡 ”'] },
            { name: "【瀋陽】中街飄初雪", w: ['初', '雪', '飄落', '在', '中街上'], e: ['Winter in', 'Shenyang'], q: ['“ 走在飄雪的瀋陽街頭，', '感受這座重工城市的溫柔 ”'] },
            { name: "【桂林】灕江山水畫", w: ['山', '水', '倒影', '在', '灕江裡'], e: ['Guilin', 'scenery'], q: ['“ 桂林的山水如畫，', '撐一竹筏便入了畫中 ”'] },
            { name: "【南寧】綠城愜意夜", w: ['微', '風', '吹過', '了', '邕江畔'], e: ['Green', 'city'], q: ['“ 騎著小電驢穿梭在街頭，', '南寧的晚風總是那麼愜意 ”'] },
            { name: "【深圳】深圳灣星光", w: ['星', '光', '點亮', '了', '深圳灣'], e: ['Shenzhen', 'Bay'], q: ['“ 在這個永不熄燈的城市，', '每個人都在追逐著夢想 ”'] },
            { name: "【汕頭】南澳島海風", w: ['海', '風', '吹過', '了', '南澳島'], e: ['Seaside', 'town'], q: ['“ 吃一碗地道的牛肉丸，', '吹一吹南澳島的海風 ”'] },
            { name: "【大理】洱海風花雪", w: ['蒼', '山', '守望', '著', '洱海月'], e: ['Dali', 'romance'], q: ['“ 下關風吹上關花，', '大理的風花雪月都在眼前 ”'] },
            { name: "【寧夏】騰格里星空", w: ['星', '光', '灑滿', '了', '騰格里'], e: ['Desert', 'stars'], q: ['“ 大漠孤煙直，長河落日圓，', '寧夏的星空浩瀚無垠 ”'] },

            { name: "【空白模板】完全自定義", w: ['字1', '字2', '長單詞', '字4', '長單詞'], e: ['English 1', 'English 2'], q: ['“ 在這裡寫下第一句，', '在這裡寫下第二句 ”'] }
        ];

        textOptions.forEach((opt, index) => {
            const optionEl = document.createElement('option');
            optionEl.value = index;
            optionEl.textContent = opt.name;
            templateSelect.appendChild(optionEl);
        });

        function loadTemplateToInputs(index) {
            const tmpl = textOptions[index];
            for(let i=0; i<5; i++) inputs.w[i].value = tmpl.w[i];
            for(let i=0; i<2; i++) inputs.e[i].value = tmpl.e[i];
            for(let i=0; i<2; i++) inputs.q[i].value = tmpl.q[i];
            triggerPreviewRender();
        }

        function triggerPreviewRender() {
            if (!currentImage) return;
            statusBadge.textContent = "流暢預覽中";
            statusBadge.className = "px-2 py-1 bg-yellow-500 text-black text-xs font-bold rounded-md";
            drawCanvas(false); 
        }

        templateSelect.addEventListener('change', (e) => loadTemplateToInputs(e.target.value));
        [...inputs.w, ...inputs.e, ...inputs.q, inputs.wm].forEach(input => input.addEventListener('input', triggerPreviewRender));
        Object.values(sliders).forEach(sliderInfo => {
            sliderInfo.el.addEventListener('input', (e) => {
                sliderInfo.val.textContent = e.target.value + '%';
                triggerPreviewRender();
            });
        });

        loadTemplateToInputs(0); 

        imageUpload.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            emptyState.style.display = 'flex';
            previewImage.style.display = 'none';
            btnDownload.disabled = true;

            let displayName = file.name;
            if(displayName.length > 15) displayName = displayName.substring(0, 15) + '...';
            
            loadingOverlay.style.display = 'flex';
            loadingText.textContent = "載入照片中...";

            try {
                let objectUrl = "";
                if (file.name.toLowerCase().endsWith('.heic') || file.type === 'image/heic') {
                    loadingText.textContent = "解碼 HEIC 原圖中...";
                    try {
                        const conversionResult = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.9 });
                        const blobToUse = Array.isArray(conversionResult) ? conversionResult[0] : conversionResult;
                        objectUrl = URL.createObjectURL(blobToUse);
                    } catch (heicError) {
                        throw new Error("無法解碼此 HEIC，請先轉存為 JPG。");
                    }
                } else {
                    objectUrl = URL.createObjectURL(file);
                }

                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    fileNameDisplay.innerHTML = `<span class="text-blue-700 font-bold">已載入: ${displayName}</span>`;
                    emptyState.style.display = 'none';
                    btnDownload.disabled = false;
                    loadingOverlay.style.display = 'none';
                    triggerPreviewRender();
                    URL.revokeObjectURL(objectUrl);
                }
                img.onerror = () => { alert("圖片載入失敗"); loadingOverlay.style.display = 'none'; }
                img.src = objectUrl;

            } catch (error) {
                alert(error.message);
                loadingOverlay.style.display = 'none';
            }
        });

        function drawSpacedText(ctx, text, x, y, letterSpacing) {
            let currentX = x;
            for (let i = 0; i < text.length; i++) {
                ctx.fillText(text[i], currentX, y);
                currentX += ctx.measureText(text[i]).width + letterSpacing;
            }
            return currentX;
        }

        function drawCanvas(isHD = false) {
            if (!currentImage) return;

            const MAX_DIM = isHD ? 3000 : 800; 
            let drawW = currentImage.width;
            let drawH = currentImage.height;
            
            if (drawW > MAX_DIM || drawH > MAX_DIM) {
                let ratio = Math.min(MAX_DIM / drawW, MAX_DIM / drawH);
                drawW = drawW * ratio;
                drawH = drawH * ratio;
            }

            canvas.width = drawW;
            canvas.height = drawH;
            ctx.drawImage(currentImage, 0, 0, drawW, drawH);

            const scaleMultiplier = sliders.size.el.value / 100;
            const txPercent = sliders.t_x.el.value / 100;
            const tyPercent = sliders.t_y.el.value / 100;
            const exPercent = sliders.e_x.el.value / 100; 
            const eyPercent = sliders.e_y.el.value / 100; 
            const qxPercent = sliders.q_x.el.value / 100;
            const qyPercent = sliders.q_y.el.value / 100;
            const alphaMain = sliders.op_main.el.value / 100;
            const alphaWm = sliders.op_wm.el.value / 100;

            const baseDimension = Math.min(drawW, drawH); 
            const baseFontSize = baseDimension * 0.08 * scaleMultiplier; 
            
            const fontFamilySerif = '"Noto Serif TC", "PMingLiU", "MingLiU", serif';
            const fontFamilySans = 'Helvetica, Arial, sans-serif';
            
            ctx.textBaseline = 'top';
            ctx.shadowColor = `rgba(0, 0, 0, ${alphaMain * 0.6})`;
            ctx.shadowBlur = baseDimension * 0.015;
            ctx.shadowOffsetX = baseDimension * 0.002;
            ctx.shadowOffsetY = baseDimension * 0.002;
            ctx.fillStyle = `rgba(248, 250, 252, ${alphaMain})`; 

            // 1. 主標題 (中文)
            const words = inputs.w.map(input => input.value);
            const staggerStyles = [
                { scale: 1.6, yOffset: 0 }, { scale: 0.9, yOffset: 0.08 },
                { scale: 1.4, yOffset: 0.04 }, { scale: 0.9, yOffset: 0.10 },
                { scale: 1.4, yOffset: 0.06 }
            ];

            let titleBaseX = drawW * txPercent;
            let titleBaseY = drawH * tyPercent; 
            let currentX = titleBaseX;

            words.forEach((word, index) => {
                if(!word) return; 
                let style = staggerStyles[index];
                ctx.font = `${style.scale * baseFontSize}px ${fontFamilySerif}`;
                let y = titleBaseY + (style.yOffset * drawH * scaleMultiplier);
                let nextX = drawSpacedText(ctx, word, currentX, y, baseDimension * 0.008);
                currentX = nextX + (baseDimension * 0.03); 
            });

            // 2. 英文副標
            let enBaseX = drawW * exPercent;
            let enBaseY = drawH * eyPercent;
            ctx.font = `300 ${0.5 * baseFontSize}px ${fontFamilySans}`;
            if(inputs.e[0].value) drawSpacedText(ctx, inputs.e[0].value, enBaseX, enBaseY, baseDimension * 0.01);
            if(inputs.e[1].value) drawSpacedText(ctx, inputs.e[1].value, enBaseX + (baseDimension * 0.15), enBaseY + (baseDimension * 0.04), baseDimension * 0.01);

            // 3. 引言
            let quoteBaseX = drawW * qxPercent;
            let quoteBaseY = drawH * qyPercent;
            ctx.font = `${0.45 * baseFontSize}px ${fontFamilySerif}`;
            if(inputs.q[0].value) drawSpacedText(ctx, inputs.q[0].value, quoteBaseX, quoteBaseY, baseDimension * 0.005);
            if(inputs.q[1].value) drawSpacedText(ctx, inputs.q[1].value, quoteBaseX, quoteBaseY + (baseDimension * 0.045), baseDimension * 0.005);

            // 4. 浮水印
            const wmText = inputs.wm.value;
            if(wmText) {
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = `rgba(248, 250, 252, ${alphaWm})`;
                ctx.font = `600 ${0.35 * baseFontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
                let wmLetterSpacing = baseDimension * 0.02;
                let wmWidth = ctx.measureText(wmText).width + (wmText.length * wmLetterSpacing);
                drawSpacedText(ctx, wmText, (drawW - wmWidth) / 2, drawH * 0.94, wmLetterSpacing);
            }

            if (!isHD) {
                previewImage.src = canvas.toDataURL('image/jpeg', 0.6);
                previewImage.style.display = 'block';
            }
        }

        function getCanvasBlob(canvas) {
            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.95);
            });
        }

        let currentFileToShare = null;

        btnDownload.addEventListener('click', async () => {
            if (!currentImage) return;
            
            loadingOverlay.style.display = 'flex';
            loadingText.textContent = "正在渲染高清畫質...";
            
            setTimeout(async () => {
                drawCanvas(true);
                const blob = await getCanvasBlob(canvas);
                
                if (hdBlobUrl) URL.revokeObjectURL(hdBlobUrl);
                
                hdBlobUrl = URL.createObjectURL(blob);
                finalHdImage.src = hdBlobUrl;
                
                currentFileToShare = new File([blob], "DASEINPRESENT_City.jpg", { type: "image/jpeg" });
                
                loadingOverlay.style.display = 'none';
                resultModal.style.display = 'flex';
                statusBadge.textContent = "✅ 高清渲染完成";
                statusBadge.className = "px-2 py-1 bg-green-500 text-white text-xs font-bold rounded-md";
                
            }, 50);
        });

        btnNativeShare.addEventListener('click', async () => {
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [currentFileToShare] })) {
                try {
                    await navigator.share({
                        files: [currentFileToShare],
                        title: 'DASEINPRESENT',
                        text: '我的城市圖文詩集'
                    });
                } catch (err) {
                    console.log("分享視窗關閉或失敗", err);
                }
            } else {
                const a = document.createElement('a');
                a.href = hdBlobUrl;
                a.download = 'DASEINPRESENT_City.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                alert("已嘗試觸發下載！\n如果沒有成功下載，請直接長按上方的圖片，選擇『儲存圖片』即可。");
            }
        });

        btnCloseModal.addEventListener('click', () => {
            resultModal.style.display = 'none';
            triggerPreviewRender();
        });

    </script>
